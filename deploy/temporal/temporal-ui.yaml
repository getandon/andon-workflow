# Not exposed via Istio. Access with:
#   kubectl -n andon port-forward svc/temporal-ui 8081:8080
apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporal-ui
  namespace: andon
  labels:
    app: temporal-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: temporal-ui
  template:
    metadata:
      labels:
        app: temporal-ui
    spec:
      containers:
        - name: temporal-ui
          image: temporalio/ui:2.52.0
          ports:
            - containerPort: 8080
          env:
            - name: TEMPORAL_ADDRESS
              value: temporal:7233
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: temporal-ui
  namespace: andon
spec:
  type: ClusterIP
  selector:
    app: temporal-ui
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
