# Fill in every value before applying. Do NOT commit filled-in values.
apiVersion: v1
kind: Secret
metadata:
  name: andon-secret
  namespace: andon
type: Opaque
stringData:
  # Operator API key shared by the API and all workers.
  API_KEY: change-me
  # AWS credentials with read/write access to the backup S3 bucket.
  AWS_ACCESS_KEY_ID: change-me
  AWS_SECRET_ACCESS_KEY: change-me
  # MongoDB the in-cluster worker manages (backup/restore/migrate/verify).
  MONGODB_URI: mongodb://change-me:27017
