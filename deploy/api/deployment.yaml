# SQLite lives on the andon-db PVC: keep replicas at 1 and strategy Recreate.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: andon
  labels:
    app: api
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: ghcr.io/getandon/andon-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: TEMPORAL_ADDRESS
              value: temporal:7233
            - name: DATABASE_URL
              value: file:/app/data/andon.db
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: andon-secret
                  key: API_KEY
          startupProbe:
            httpGet:
              path: /api/workers/health
              port: 3000
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /api/workers/health
              port: 3000
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/workers/health
              port: 3000
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          volumeMounts:
            - name: data
              mountPath: /app/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: andon-db
