# Must be named "api": the frontend nginx proxies /api/ and /socket.io/
# to http://api:3000, and the in-cluster worker uses ANDON_API_URL=http://api:3000.
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: andon
spec:
  type: ClusterIP
  selector:
    app: api
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
