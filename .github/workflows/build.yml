name: Build

on:
  push:
    branches: [main, dev, test]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/getandon
  DOCKER_BUILD_RECORD_UPLOAD: false

jobs:
  base:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        id: build
        with:
          context: .
          file: docker/base.Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/andon-base:${{ github.ref_name }}
          cache-from: |
            type=registry,ref=${{ env.IMAGE_PREFIX }}/andon-base:${{ github.ref_name }}
            type=registry,ref=${{ env.IMAGE_PREFIX }}/andon-base:main
          cache-to: type=inline

      - name: Build summary
        run: |
          {
            echo "## andon-base"
            echo ""
            echo "Published to GHCR (public image, no artifacts uploaded):"
            echo ""
            echo "- \`${{ env.IMAGE_PREFIX }}/andon-base:${{ github.ref_name }}\`"
            echo ""
            echo "Digest: \`${{ steps.build.outputs.digest }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  app:
    runs-on: ubuntu-latest
    needs: base
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - name: api
            dockerfile: apps/api/Dockerfile
          - name: worker
            dockerfile: apps/worker/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_PREFIX }}/andon-${{ matrix.name }}
          tags: |
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@v6
        id: build
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          build-args: |
            BASE_IMAGE=${{ env.IMAGE_PREFIX }}/andon-base:${{ github.ref_name }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,scope=${{ matrix.name }},mode=max

      - name: Build summary
        run: |
          {
            echo "## andon-${{ matrix.name }}"
            echo ""
            echo "Published to GHCR (public image, no artifacts uploaded):"
            echo ""
            echo "${{ steps.meta.outputs.tags }}" | sed 's/^/- `/;s/$/`/'
            echo ""
            echo "Digest: \`${{ steps.build.outputs.digest }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.IMAGE_PREFIX }}/andon-frontend
          tags: |
            type=ref,event=branch
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@v6
        id: build
        with:
          context: apps/frontend
          file: apps/frontend/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

      - name: Build summary
        run: |
          {
            echo "## andon-frontend"
            echo ""
            echo "Published to GHCR (public image, no artifacts uploaded):"
            echo ""
            echo "${{ steps.meta.outputs.tags }}" | sed 's/^/- `/;s/$/`/'
            echo ""
            echo "Digest: \`${{ steps.build.outputs.digest }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
